<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHS.ai | Knowledge Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#151515;--muted:#665f54;--moss:#1B6358;--bg:#f2ede3;--panel:#fffaf2;--line:rgba(21,21,21,.1);--shadow:0 24px 48px rgba(58,40,19,.12)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Instrument Sans',sans-serif;color:var(--ink);min-height:100vh;background:radial-gradient(circle at top left,rgba(27,99,88,.14),transparent 28%),linear-gradient(180deg,#f6f1e8 0%,#efe6d7 100%);display:grid;place-items:center;padding:20px}a{text-decoration:none;color:inherit}.panel{width:min(760px,100%);padding:30px;border-radius:28px;background:rgba(255,250,242,.9);border:1px solid rgba(21,21,21,.08);box-shadow:var(--shadow)}.eyebrow{font-size:.76rem;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:12px}.title{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,5vw,3.4rem);letter-spacing:-.06em;line-height:.95;max-width:11ch}.copy{margin-top:14px;color:var(--muted);line-height:1.7}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}.btn{border:none;border-radius:999px;padding:12px 16px;cursor:pointer}.primary{background:var(--ink);color:#fff}.soft{background:rgba(21,21,21,.06);color:var(--ink)}
</style>
<link rel="stylesheet" href="/dashboard/brand.css?v=20260409-schoolbrand">
</head>
<body>
<main class="panel brand-shell">
  <div class="auth-brand"><img class="brand-mark brand-mark-lg" src="/dashboard/logo.jpeg" alt="AECHS logo"><span class="brand-copy"><span class="brand-title">CHS.ai</span><span class="brand-subtitle">AECHS Staff Assistant</span></span></div>
  <div class="eyebrow">Knowledge Workspace</div>
  <h1 class="title">Training moved into admin control.</h1>
  <p class="copy">The old training page has been merged into the rebuilt admin experience so prompt editing, structured knowledge, flagged replies, and document history all live in one place.</p>
  <div class="row">
    <a class="btn primary" href="/dashboard/admin">Open Admin Control</a>
    <a class="btn soft" href="/dashboard">Open Dashboard</a>
  </div>
</main>
<script>
setTimeout(()=>{ if (location.pathname.includes('/dashboard/train')) location.replace('/dashboard/admin'); }, 1200);
</script>
</body>
</html>
